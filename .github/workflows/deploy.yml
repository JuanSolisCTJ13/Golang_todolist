name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA }}

      - name: Build and Push
        run: |
          gcloud builds submit backend --tag gcr.io/${{ secrets.GCP_PROJECT }}/todolist

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: todolist
          image: gcr.io/${{ secrets.GCP_PROJECT }}/todolist
          region: us-central1
          allow-unauthenticated: true
